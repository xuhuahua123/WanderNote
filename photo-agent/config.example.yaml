# WanderNote Photo Agent 配置文件
#
# 使用方法：
# 1. 复制此文件为 config.yaml
# 2. 填写 agent_id、server_url、photo_root
# 3. 设置 agent_token（优先读取环境变量 AGENT_TOKEN）
#
# 配置优先级：环境变量 > config.yaml > 默认值

# Agent 唯一标识
agent_id: home-mac-001

# 后端服务器地址
server_url: http://localhost:8080

# Agent 认证 token
# 优先读取环境变量 AGENT_TOKEN
# 真实 token 不得提交到代码仓库
agent_token: ""

# 照片根目录
# 支持绝对路径，例如：
#   macOS: /Users/xxx/Pictures/旅行照片
#   Windows: D:\旅行照片
photo_root: "/path/to/travel/photos"

# 增量扫描间隔（分钟）
scan_interval_minutes: 10

# 缩略图长边尺寸（像素）
thumb_long_edge: 360

# 预览图长边尺寸（像素）
preview_long_edge: 1280

# 索引上传批量大小
index_batch_size: 100

# 缩略图上传并发数
thumb_upload_concurrency: 3

# 预览图上传并发数
preview_upload_concurrency: 1

# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: INFO
