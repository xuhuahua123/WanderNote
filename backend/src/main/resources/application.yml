server:
  port: 8080
  tomcat:
    basedir: C:/Users/31510/wandernote-tomcat

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 30000
      pool-name: WanderNoteHikariCP
      max-lifetime: 120000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.wandernote: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Application specific config
wandernote:
  access-code: ${ACCESS_CODE}
  agent-token: ${AGENT_TOKEN}
  jwt:
    secret: ${JWT_SECRET:wandernote-default-secret-change-in-production}
    expiration-hours: 2
    max-expiration-days: 7
  tencent:
    map:
      key: ${TENCENT_MAP_KEY}
  cos:
    region: ${COS_REGION:ap-guangzhou}
    bucket: ${COS_BUCKET:baizhi-wandernote-1318597275}
    secret-id: ${COS_SECRET_ID}
    secret-key: ${COS_SECRET_KEY}
    upload-url-ttl-seconds: ${COS_UPLOAD_URL_TTL_SECONDS:600}
    download-url-ttl-seconds: ${COS_DOWNLOAD_URL_TTL_SECONDS:900}
  mimo:
    api-base-url: ${MIMO_API_BASE_URL}
    api-key: ${MIMO_API_KEY}
    model: ${MIMO_MODEL:mimo-v2.5}